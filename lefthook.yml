pre-commit:
  parallel: true
  commands:
    dotnet-format:
      glob: "*.cs"
      # Build at the 4.9 ABI (Emby SDK from NuGet) so a fresh clone or git
      # worktree without the gitignored 4.10 embylibs/ reference DLLs can still
      # commit. Formatting is ABI-independent; the pre-push gate and CI still
      # build the default 4.10 ABI.
      # EmbyAbi is set via env (not an inline VAR=val prefix) so the command is
      # shell-agnostic and works on Windows (cmd/PowerShell) as well as Unix.
      env:
        EmbyAbi: "4.9"
      run: dotnet format segment_reporting/segment_reporting.csproj --verify-no-changes
    eslint:
      glob: "segment_reporting/Pages/*.js"
      exclude: "*.min.js"
      run: npx --prefix segment_reporting eslint --config segment_reporting/eslint.config.mjs {staged_files}
    whitespace:
      run: git diff --cached --check
    gitleaks:
      run: gitleaks protect --staged --no-banner
      fail_text: |
        gitleaks found staged secrets. Install gitleaks if missing:
          brew install gitleaks   (macOS)
          https://github.com/gitleaks/gitleaks (other platforms)
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}
      fail_text: |
        actionlint found workflow problems. Install if missing:
          brew install actionlint   (macOS)
          https://github.com/rhysd/actionlint (other platforms)

# pre-push mirrors the CI "build" job (.github/workflows/build.yml) so a push
# that would fail CI is caught locally first. The pre-commit stage only checks
# format + eslint on *staged* files; it never compiles and never applies the
# analyzer `-warnaserror` policy, so a clean commit can still break CI (a
# missing using directive, an analyzer warning, an unstaged-but-tracked .cs
# edit). The gate runs a full Release build + format + lint on the whole
# solution, exactly as CI does. It lives in a script (not inline commands) so a
# single trap can always restore the minified JS sources even when a step
# fails. Skip with: git push --no-verify (you are bypassing the CI gate).
pre-push:
  commands:
    ci-gate:
      run: bash scripts/pre-push-gate.sh
      fail_text: |
        Pre-push gate failed (this is what CI runs). Fix the errors above
        before pushing, or bypass with `git push --no-verify` (not advised).
