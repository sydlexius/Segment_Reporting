name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: csharp
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '8.0.x'

      - name: Fetch Emby 4.10.0.13 reference assemblies
        if: matrix.language == 'csharp'
        run: |
          set -euo pipefail
          mkdir -p segment_reporting/embylibs
          extract_dir="$(mktemp -d)"
          url="https://github.com/MediaBrowser/Emby.Releases/releases/download/4.10.0.13/emby-server-freebsd14_4.10.0.13_amd64.tar.xz"
          curl -fsSL "$url" -o /tmp/emby.tar.xz
          tar xJf /tmp/emby.tar.xz -C "$extract_dir" --wildcards \
            '*/MediaBrowser.Model.dll' '*/MediaBrowser.Common.dll' \
            '*/MediaBrowser.Controller.dll' '*/Emby.Naming.dll'
          find "$extract_dir" \( -name 'MediaBrowser.*.dll' -o -name 'Emby.Naming.dll' \) \
            -exec cp {} segment_reporting/embylibs/ \;
          ls -la segment_reporting/embylibs/

      - name: Initialize CodeQL
        uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          category: "/language:${{ matrix.language }}"
