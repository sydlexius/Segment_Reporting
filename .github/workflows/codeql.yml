name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Emby prunes old releases from MediaBrowser/Emby.Releases, so a pinned version
# eventually 404s rather than merely going stale. Keep it in one place per workflow.
env:
  EMBY_VERSION: "4.10.0.19"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: csharp
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
            # Path-scoped exclusion of the generated docs/plugins_mockup.html
            # bundle artifact (see .github/codeql/codeql-config.yml). Set on the
            # JS leg only; empty for the actions/csharp legs, which codeql-action
            # treats as "no config" (default behavior).
            config-file: ./.github/codeql/codeql-config.yml

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '8.0.x'

      - name: Fetch Emby ${{ env.EMBY_VERSION }} reference assemblies
        if: matrix.language == 'csharp'
        run: |
          set -euo pipefail
          mkdir -p segment_reporting/embylibs
          extract_dir="$(mktemp -d)"
          url="https://github.com/MediaBrowser/Emby.Releases/releases/download/${EMBY_VERSION}/emby-server-freebsd14_${EMBY_VERSION}_amd64.tar.xz"
          curl -fsSL "$url" -o /tmp/emby.tar.xz
          tar xJf /tmp/emby.tar.xz -C "$extract_dir" --wildcards \
            '*/MediaBrowser.Model.dll' '*/MediaBrowser.Common.dll' \
            '*/MediaBrowser.Controller.dll' '*/Emby.Naming.dll'
          find "$extract_dir" \( -name 'MediaBrowser.*.dll' -o -name 'Emby.Naming.dll' \) \
            -exec cp {} segment_reporting/embylibs/ \;
          ls -la segment_reporting/embylibs/

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ${{ matrix.config-file }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
