name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: csharp
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
            # Path-scoped exclusion of the generated docs/plugins_mockup.html
            # bundle artifact (see .github/codeql/codeql-config.yml). Set on the
            # JS leg only; empty for the actions/csharp legs, which codeql-action
            # treats as "no config" (default behavior).
            config-file: ./.github/codeql/codeql-config.yml

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '8.0.x'

      - name: Fetch Emby 4.10.0.13 reference assemblies
        if: matrix.language == 'csharp'
        run: |
          set -euo pipefail
          mkdir -p segment_reporting/embylibs
          extract_dir="$(mktemp -d)"
          url="https://github.com/MediaBrowser/Emby.Releases/releases/download/4.10.0.13/emby-server-freebsd14_4.10.0.13_amd64.tar.xz"
          curl -fsSL "$url" -o /tmp/emby.tar.xz
          tar xJf /tmp/emby.tar.xz -C "$extract_dir" --wildcards \
            '*/MediaBrowser.Model.dll' '*/MediaBrowser.Common.dll' \
            '*/MediaBrowser.Controller.dll' '*/Emby.Naming.dll'
          find "$extract_dir" \( -name 'MediaBrowser.*.dll' -o -name 'Emby.Naming.dll' \) \
            -exec cp {} segment_reporting/embylibs/ \;
          ls -la segment_reporting/embylibs/

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ${{ matrix.config-file }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
