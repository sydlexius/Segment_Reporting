name: Build and Release

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install JS build tools
        run: npm ci --prefix segment_reporting

      - name: Minify JS for Release
        run: npm run build:js --prefix segment_reporting

      - name: Restore dependencies
        run: dotnet restore Segment_Reporting.sln

      - name: Build with analyzers
        run: dotnet build Segment_Reporting.sln --configuration Release --no-restore -warnaserror

      - name: Run tests
        run: dotnet test Segment_Reporting.sln --configuration Release --no-build

      - name: Check code formatting
        run: dotnet format Segment_Reporting.sln --verify-no-changes --no-restore

      - name: Lint JavaScript
        run: npm run lint:js --prefix segment_reporting

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: segment_reporting-dll
          path: segment_reporting/bin/Release/**/segment_reporting.dll

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install JS build tools
        run: npm ci --prefix segment_reporting

      - name: Minify JS for Release
        run: npm run build:js --prefix segment_reporting

      - name: Restore dependencies
        run: dotnet restore Segment_Reporting.sln

      - name: Build
        run: dotnet build Segment_Reporting.sln --configuration Release --no-restore

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: segment_reporting-dll
          path: ./release-assets

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: ./release-assets/**/*.dll
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
