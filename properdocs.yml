site_name: Segment Reporting
site_description: Emby server plugin for caching, reporting, and editing media segment markers (Intros and Credits)
site_url: https://sydlexius.github.io/Segment_Reporting/
repo_url: https://github.com/sydlexius/Segment_Reporting
repo_name: sydlexius/Segment_Reporting
edit_uri: edit/main/docs/

# Built with ProperDocs (drop-in MkDocs 1.x continuation) + the Material theme.
# Standard layout: docs live under docs/ (USER_GUIDE.md, DEVELOPER.md, index.md)
# and the screenshots they embed live under docs/Screenshots/, so every asset
# is inside docs_dir and `properdocs build --strict` stays clean with no extra
# plugins. site_dir (the build output) is at the repo root and gitignored.
docs_dir: docs
site_dir: site

# docs/plans/ holds internal planning docs that should not be published.
exclude_docs: |
  plans/

theme:
  name: material
  palette:
    # Material's named "green" is #4CAF50 - exactly the plugin's "Green
    # (Default)" chart accent. Light + dark schemes mirror the plugin's
    # theme-aware behavior (#77).
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.tooltips
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sydlexius/Segment_Reporting

nav:
  - Home: index.md
  - User Guide: USER_GUIDE.md
  - Developer Guide: DEVELOPER.md
